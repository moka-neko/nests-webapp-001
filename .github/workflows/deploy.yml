name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  API_BASE_URL: ${{ vars.API_BASE_URL }}
  ADMIN_S3_BUCKET: ${{ vars.ADMIN_S3_BUCKET }}
  ADMIN_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.ADMIN_CLOUDFRONT_DISTRIBUTION_ID }}
  PUBLIC_S3_BUCKET: ${{ vars.PUBLIC_S3_BUCKET }}
  PUBLIC_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.PUBLIC_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/app_test
      JWT_SECRET: ci-jwt-secret
      MFA_ENCRYPTION_KEY: ci-mfa-encryption-key
      ADMIN_EMAIL: ci-admin@example.com
      ADMIN_PASSWORD: ci-password123
      ADMIN_NAME: CI Admin
      CORS_ORIGINS: http://localhost:3001,http://localhost:5173
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      VITE_API_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint API
        run: npx eslint "{src,test}/**/*.ts"

      - name: Lint admin
        run: npm run lint --workspace=admin

      - name: Lint public
        run: npm run lint --workspace=public

      - name: Build all apps
        run: npm run build:all

      - name: Run API e2e tests
        run: npm run test:e2e

  deploy-api:
    name: Deploy API to App Runner
    runs-on: ubuntu-latest
    needs: verify
    env:
      APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply production migrations
        run: |
          : "${DATABASE_URL:?Set SUPABASE_DATABASE_URL repository secret}"
          : "${DIRECT_URL:?Set SUPABASE_DIRECT_URL repository secret}"
          npx prisma migrate deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          : "${ECR_REPOSITORY:?Set ECR_REPOSITORY repository variable}"
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            --tag "$IMAGE_URI:${GITHUB_SHA}" \
            --tag "$IMAGE_URI:latest" \
            .
          docker push "$IMAGE_URI:${GITHUB_SHA}"
          docker push "$IMAGE_URI:latest"

      - name: Start App Runner deployment
        run: |
          : "${APP_RUNNER_SERVICE_ARN:?Set APP_RUNNER_SERVICE_ARN repository secret}"
          aws apprunner start-deployment --service-arn "$APP_RUNNER_SERVICE_ARN"

      - name: Smoke test API
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL repository variable is not set; skipping smoke test."
            exit 0
          fi
          curl --fail --retry 10 --retry-delay 15 "$API_BASE_URL/health"

  deploy-admin:
    name: Deploy admin to S3
    runs-on: ubuntu-latest
    needs: verify
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: |
          : "${VITE_API_BASE_URL:?Set API_BASE_URL repository variable}"
          npm run build:admin

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync admin assets
        run: |
          : "${ADMIN_S3_BUCKET:?Set ADMIN_S3_BUCKET repository variable}"
          aws s3 sync apps/admin/dist "s3://$ADMIN_S3_BUCKET" --delete
          if [ -n "$ADMIN_CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$ADMIN_CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*"
          fi

  deploy-public:
    name: Deploy public site to S3
    runs-on: ubuntu-latest
    needs: verify
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
      NEXT_PUBLIC_PRIVACY_POLICY_URL: ${{ vars.NEXT_PUBLIC_PRIVACY_POLICY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build public site
        run: |
          : "${NEXT_PUBLIC_API_BASE_URL:?Set API_BASE_URL repository variable}"
          npm run build:public

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync public assets
        run: |
          : "${PUBLIC_S3_BUCKET:?Set PUBLIC_S3_BUCKET repository variable}"
          aws s3 sync apps/public/out "s3://$PUBLIC_S3_BUCKET" --delete
          if [ -n "$PUBLIC_CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$PUBLIC_CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*"
          fi
